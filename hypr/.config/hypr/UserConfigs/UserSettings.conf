# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# User Settings for Ubuntu 24.04 with Hyprland v0.39
# This is where you put your own settings as this will not be touched during update 
# if the upgrade.sh is used.

# refer to Hyprland wiki for more info https://wiki.hyprland.org/Configuring/Variables/

# NOTE: some settings are in ~/.config/hypr/UserConfigs/UserDecorAnimations.conf

dwindle {
  # pseudotile = yes        # v0.55: dwindle:pseudotile removed (now dispatcher only)
  preserve_split = yes
  special_scale_factor = 0.9
}

master {
  # new_is_master=1         # v0.55: renamed to new_status
  new_status = master
  new_on_top = 1
  mfact = 0.5
}

general {
  # sensitivity=1.00        # v0.55: moved to input{}
  # apply_sens_to_raw=1     # v0.55: moved to input{}
  resize_on_border = true

  layout = dwindle
}

input {
  # sensitivity = 1.00      # max accel - too fast
  # sensitivity = 0.0       # neutral - too slow
  sensitivity = 0.3         # slightly above neutral
  # apply_sens_to_raw = 1   # v0.55: removed entirely (not in input{} either)
  kb_layout = us
  kb_variant =
  kb_model =
  kb_options =
  kb_rules =
  repeat_rate = 50
  repeat_delay = 300
  
  numlock_by_default = true
  left_handed = false
  follow_mouse = true
  float_switch_override_focus = false

  touchpad {
    disable_while_typing = true
    natural_scroll = false 
    clickfinger_behavior = false
    middle_button_emulation = true
    tap-to-click = true
    drag_lock = false
          }

}

# v0.55: workspace_swipe/_fingers removed from gestures{} - new top-level syntax:
gesture = 3, horizontal, workspace

gestures {
  # workspace_swipe=true          # v0.55: removed (see gesture= line above)
  # workspace_swipe_fingers=3     # v0.55: removed (fingers set in gesture= line)
  workspace_swipe_distance=400
  workspace_swipe_invert=true
  workspace_swipe_min_speed_to_force=30
  workspace_swipe_cancel_ratio=0.5
  workspace_swipe_create_new=true 
  workspace_swipe_forever=true
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  mouse_move_enables_dpms = true
  #vrr = 0
  enable_swallow = false
  # no_direct_scanout = true   # v0.55: removed (now render:direct_scanout, default ok)
  focus_on_activate = false
  swallow_regex = ^(kitty)$
  #disable_autoreload = true
  # enable_hyprcursor = true   # v0.55: removed (hyprcursor is default now)

}

binds {
  workspace_back_and_forth=true
  allow_workspace_cycles=true
  pass_mouse_when_bound=false
}

#Could help when scaling and not pixelating
xwayland {
    force_zero_scaling = true
}
