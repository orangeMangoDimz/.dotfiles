# Decoration Settings

# Hyprland Wiki Links
# Animation - https://wiki.hyprland.org/Configuring/Animations/
# Decoration - https://wiki.hyprland.org/Configuring/Variables/#decoration

# Sourcing colors generated by wallust
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf

general {
  border_size = 0
  gaps_in = 0
  gaps_out = 0
  
  col.active_border = $color12 
  col.inactive_border = $color10
}

decoration {
  # rounding = 0
  rounding = 12  # iOS-style rounded corners

  # active_opacity = 1.0
  # inactive_opacity = 1
  # fullscreen_opacity = 1.0
  # active_opacity = 0.88    # [v1] iOS frosted glass - less transparent
  # inactive_opacity = 0.82  # [v1]
  active_opacity = 0.72      # [v2] Liquid Glass - heavy transparency
  inactive_opacity = 0.62    # [v2] even more transparent when unfocused
  fullscreen_opacity = 1.0

  dim_inactive = true
  dim_strength = 0.1
  dim_special = 0.8

  drop_shadow = false
  shadow_range = 6
  shadow_render_power = 1
  col.shadow = $color12
  col.shadow_inactive = $color2

  blur {
    enabled = true

    # --- old blur settings ---
    # size = 6
    # passes = 2
    # ignore_opacity = true
    # new_optimizations = true
    # special = true

    # --- [v1] iOS frosted glass blur ---
    # size = 12
    # passes = 4
    # noise = 0.0117
    # contrast = 0.8916
    # brightness = 0.8172
    # vibrancy = 0.1696
    # vibrancy_darkness = 0.0

    # --- [v2] Apple Liquid Glass - max native blur ---
    size = 22               # very heavy blur radius (max glass thickness feel)
    passes = 6              # maximum smoothness passes
    noise = 0.025           # stronger grain = frosted/matte glass texture
    contrast = 0.90         # balanced contrast through the glass
    brightness = 0.88       # slightly lit glass surface
    vibrancy = 0.30         # strong color vibrancy (Liquid Glass color pop)
    vibrancy_darkness = 0.5 # also boost dark areas behind glass
    ignore_opacity = true
    new_optimizations = true
    special = true
    xray = false            # blur everything behind window, not just wallpaper
  }
}

group {
  col.border_active = rgb(cba6f7)   # Catppuccin Mocha - Mauve

  groupbar {
    col.active = rgb(45475a)        # Catppuccin Mocha - Surface1
    col.inactive = rgb(1e1e2e)      # Catppuccin Mocha - Base
    text_color = rgb(cdd6f4)        # Catppuccin Mocha - Text
    font_size = 12
    height = 24
  }
}
