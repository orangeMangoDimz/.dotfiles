# Decoration Settings

# Hyprland Wiki Links
# Animation - https://wiki.hyprland.org/Configuring/Animations/
# Decoration - https://wiki.hyprland.org/Configuring/Variables/#decoration

# Sourcing colors generated by wallust
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf

general {
  # border_size = 0          # [v11] add a glass rim (fake fresnel/specular edge)
  border_size = 0
  gaps_in = 0
  gaps_out = 0

  # col.active_border = $color12   # [v11] translucent white rim = lit glass edge
  # col.inactive_border = $color10
  # col.active_border = rgba(ffffff55)  # [v12] crisper for clear glass
  col.active_border = rgba(ffffff66)    # crisp clear-glass edge when focused
  col.inactive_border = rgba(ffffff1f)  # faint edge when unfocused
}

decoration {
  # rounding = 0
  rounding = 12          # [v7] iOS-ish corner radius
  rounding_power = 2.0   # [perf] iGPU — less compute than squircle

  # --- opacity history ---
  # active_opacity = 1.0      # [original] fully opaque
  # active_opacity = 0.88     # [v1]
  # active_opacity = 0.72     # [v2] too transparent, unreadable
  # active_opacity = 0.90     # [v3]
  # active_opacity = 1.0      # [v4 GlassesArch] - no visible effect on active windows
  # active_opacity = 0.93      # [v5] too subtle
  # inactive_opacity = 0.85   # [v5]
  # active_opacity = 0.85     # [v6]
  # inactive_opacity = 0.75   # [v6]
  # active_opacity = 0.86     # [v7]
  # inactive_opacity = 0.78   # [v7]
  # fullscreen_opacity = 0.90 # [v8]
  # active_opacity = 0.82     # [v11]
  # inactive_opacity = 0.74   # [v11]
  # fullscreen_opacity = 0.86 # [v11]
  # active_opacity = 0.84       # [v12] clear glass - readable see-through
  # inactive_opacity = 0.76     # [v12]
  active_opacity = 1.0        # [v15] fully opaque = direct scanout eligible
  inactive_opacity = 1.0      # [v14] no opacity delta on switch = no recomposite
  # fullscreen_opacity = 0.88 # [v12] - made fullscreen apps see-through
  fullscreen_opacity = 1.0    # fullscreen = fully solid, no transparency
                              #      (browsers/editors run maximized = main case)

  dim_inactive = false        # [v14] disabled = no recomposite on every focus change
  dim_strength = 0.1
  dim_special = 0.8

  # --- soft shadows for glass depth ---
  # v0.39 syntax (REMOVED in v0.55 - kept for rollback reference):
  # drop_shadow = false
  # drop_shadow = true
  # shadow_range = 32
  # shadow_render_power = 2
  # col.shadow = rgba(00000050)
  # col.shadow_inactive = rgba(00000030)
  # v0.55 syntax: shadows moved into shadow { } sub-block
  shadow {
    enabled = false
    range = 15
    render_power = 3        # [v7] softer falloff = floating glass pane look
    color = rgba(00000055)
    color_inactive = rgba(00000028)
  }

  blur {
    enabled = true

    # --- previous blur attempts ---
    # size = 6   passes = 2                              [original]
    # size = 12  passes = 4  noise=0.0117  vibrancy=0.17 [v1]
    # size = 22  passes = 6  noise=0.025   vibrancy=0.30 [v2 - too heavy]
    # size = 14  passes = 4  noise=0.015   vibrancy=0.20 [v3]

    # --- [v6] liquid glass blur ---
    # size = 8  passes = 4  noise=0.02  contrast=0.9  brightness=0.9  vibrancy=0.17

    # --- [v7] too heavy ---
    # size = 10  passes = 4  noise=0.015  contrast=0.95  brightness=0.9  vibrancy=0.21

    # --- [v9] light clarity ---
    # size = 4  passes = 2  noise=0.0  contrast=1.0  brightness=1.05  vibrancy=0.15

    # --- [v10] hyprglass dark-theme defaults, native-mapped 1:1 ---
    # size = 7                # [v11] reduced a bit
    # size = 5                # [v11] lighter blur
    # size = 8                  # [v12] clear glass - stronger blur
    size = 5                   # [v13] reduced blur
    # passes = 3              # [v12] reduced
    # passes = 2              # [v12] minimal softening
    passes = 1              # [perf] iGPU — single pass
    new_optimizations = on
    ignore_opacity = false
    xray = false
    noise = 0.0             # hyprglass glass shader has no grain
    # contrast=0.90 brightness=0.82 vibrancy=0.15  # [v11] hyprglass dark tint
    contrast = 1.0          # [v12] clear glass - true colors, no tint
    brightness = 1.0        # [v12] clean, not dimmed
    vibrancy = 0.08         # [v12] near-clear, minimal color pop
    vibrancy_darkness = 0.0 # = hyprglass dark vibrancy_darkness (exact)
    popups = false
    # shader-only, NOT native: refraction, chromatic aberration,
    # fresnel, specular, lens_distortion, 0x8899aa22 tint
    special = false
  }
}

group {
  col.border_active = rgb(cba6f7)   # Catppuccin Mocha - Mauve

  groupbar {
    col.active = rgb(45475a)        # Catppuccin Mocha - Surface1
    col.inactive = rgb(1e1e2e)      # Catppuccin Mocha - Base
    text_color = rgb(cdd6f4)        # Catppuccin Mocha - Text
    font_size = 12
    height = 24
  }
}
